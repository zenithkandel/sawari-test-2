<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sawari Admin Portal</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="portal.css" />
  </head>
  <body>
    <div class="portal-shell">
      <aside class="sidebar" id="sidebar">
        <div class="brand-row">
          <a href="../index.html" class="brand-link" aria-label="Back to app">
            <span class="brand-icon"
              ><i class="fa-solid fa-bus-simple"></i
            ></span>
            <span class="brand-text">Sawari Admin</span>
          </a>
          <button
            class="icon-btn mobile-only"
            id="btn-close-sidebar"
            title="Close menu"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="sidebar-search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="nav-search" placeholder="Search tools" />
        </div>

        <nav class="nav-list" id="nav-list">
          <button
            class="nav-item active"
            data-src="pages/overview.html"
            data-title="Overview"
            data-keywords="overview dashboard summary"
          >
            <i class="fa-solid fa-chart-line"></i><span>Overview</span>
          </button>
          <button
            class="nav-item"
            data-src="workspace.html#stops"
            data-title="Stops Manager"
            data-keywords="stops station map"
          >
            <i class="fa-solid fa-map-pin"></i><span>Stops Manager</span>
          </button>
          <button
            class="nav-item"
            data-src="workspace.html#routes"
            data-title="Routes Planner"
            data-keywords="route lines planner"
          >
            <i class="fa-solid fa-route"></i><span>Routes Planner</span>
          </button>
          <button
            class="nav-item"
            data-src="workspace.html#vehicles"
            data-title="Fleet Control"
            data-keywords="vehicles fleet buses"
          >
            <i class="fa-solid fa-bus"></i><span>Fleet Control</span>
          </button>
          <button
            class="nav-item"
            data-src="pages/reports.html"
            data-title="Reports"
            data-keywords="reports analytics insights"
          >
            <i class="fa-solid fa-file-chart-column"></i><span>Reports</span>
          </button>
          <button
            class="nav-item"
            data-src="pages/help.html"
            data-title="Help & Productivity"
            data-keywords="help shortcuts guide"
          >
            <i class="fa-solid fa-circle-question"></i
            ><span>Help & Productivity</span>
          </button>
        </nav>

        <div class="sidebar-foot">
          <p>Transit operations portal</p>
          <a href="../index.html">Open Public App</a>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="topbar-left">
            <button class="icon-btn" id="btn-open-sidebar" title="Open menu">
              <i class="fa-solid fa-bars"></i>
            </button>
            <div class="title-stack">
              <p class="title-kicker">Operations Console</p>
              <h1 id="page-title">Overview</h1>
            </div>
          </div>

          <div class="topbar-actions">
            <button
              class="chip-btn"
              id="btn-refresh-frame"
              title="Reload current page"
            >
              <i class="fa-solid fa-rotate-right"></i> Refresh
            </button>
            <button
              class="chip-btn"
              id="btn-open-new-tab"
              title="Open current page in new tab"
            >
              <i class="fa-solid fa-up-right-from-square"></i> New Tab
            </button>
            <button
              class="chip-btn"
              id="btn-fullscreen"
              title="Focus content area"
            >
              <i class="fa-solid fa-expand"></i> Focus
            </button>
            <div class="clock" id="clock"></div>
          </div>
        </header>

        <section class="frame-card" id="frame-card">
          <div class="frame-loader" id="frame-loader">
            <span class="loader-dot"></span>
            <span>Loading workspace...</span>
          </div>
          <iframe
            id="content-frame"
            title="Admin content"
            loading="eager"
            src="pages/overview.html"
          ></iframe>
        </section>
      </main>
    </div>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <script src="portal.js"></script>
  </body>
</html>
