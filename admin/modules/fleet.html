<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fleet Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="modules.css" />
  </head>
  <body>
    <header class="page-head">
      <div>
        <h1>Fleet Control</h1>
        <p>
          Dedicated fleet workspace with route assignment, motion state
          controls, and bulk operations.
        </p>
      </div>
    </header>

    <section class="kpis">
      <article class="kpi">
        <span>Total Vehicles</span><strong id="kpi-total">0</strong>
      </article>
      <article class="kpi">
        <span>Selected</span><strong id="kpi-selected">0</strong>
      </article>
      <article class="kpi">
        <span>Moving</span><strong id="kpi-moving">0</strong>
      </article>
      <article class="kpi">
        <span>Hidden</span><strong id="kpi-hidden">0</strong>
      </article>
    </section>

    <section class="panel">
      <div class="panel-head"><h2>Add Vehicle</h2></div>
      <div class="panel-body row">
        <input id="new-name" placeholder="Vehicle name" />
        <input
          id="new-lat"
          type="number"
          step="0.00001"
          placeholder="Latitude"
        />
        <input
          id="new-lng"
          type="number"
          step="0.00001"
          placeholder="Longitude"
        />
        <input
          id="new-speed"
          type="number"
          min="1"
          max="200"
          value="40"
          placeholder="Speed"
        />
        <select id="new-route"></select>
        <button class="primary" id="btn-add">Add Vehicle</button>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>Fleet Inventory</h2>
        <div class="row" style="flex: 1; justify-content: flex-end">
          <input
            id="search"
            placeholder="Search vehicles"
            style="max-width: 240px"
          />
          <button id="btn-refresh" class="ghost">
            <i class="fa-solid fa-rotate"></i>
          </button>
        </div>
      </div>
      <div class="panel-body">
        <div class="bulk-strip">
          <strong id="selected-text">0 selected</strong>
          <select id="bulk-route" style="min-width: 170px"></select>
          <button id="btn-assign-route" class="primary">
            Assign Route To Selected
          </button>
          <button id="btn-start-selected">Start Selected</button>
          <button id="btn-stop-selected">Stop Selected</button>
          <button id="btn-hide-selected">Hide Selected</button>
          <button id="btn-show-all">Show All</button>
          <button id="btn-delete-selected" class="warn">Delete Selected</button>
        </div>
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="check-all" /></th>
              <th>Name</th>
              <th>Speed</th>
              <th>Route</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>

    <div id="toast-wrap" class="toast-wrap"></div>
    <script src="common.js"></script>
    <script>
      let vehicles = [];
      let routes = [];
      const selected = new Set();
      const hidden = new Set();

      function routeName(routeId) {
        return routes.find((r) => r.id === routeId)?.name || "Unassigned";
      }

      function routeOptions() {
        return (
          '<option value="0">Unassigned</option>' +
          routes
            .map(
              (r) => `<option value="${r.id}">${escapeHtml(r.name)}</option>`,
            )
            .join("")
        );
      }

      function updateKpis() {
        byId("kpi-total").textContent = vehicles.length;
        byId("kpi-selected").textContent = selected.size;
        byId("kpi-moving").textContent = vehicles.filter(
          (v) => v.moving,
        ).length;
        byId("kpi-hidden").textContent = hidden.size;
        byId("selected-text").textContent = `${selected.size} selected`;
      }

      function renderRows() {
        const q = byId("search").value.trim().toLowerCase();
        const list = vehicles.filter(
          (v) => !q || v.name.toLowerCase().includes(q),
        );
        const body = byId("rows");
        if (!list.length) {
          body.innerHTML =
            '<tr><td colspan="6" class="empty">No vehicles found</td></tr>';
          updateKpis();
          return;
        }

        body.innerHTML = list
          .map(
            (v) => `
          <tr style="opacity:${hidden.has(v.id) ? 0.4 : 1}">
            <td><input type="checkbox" data-id="${v.id}" ${selected.has(v.id) ? "checked" : ""} /></td>
            <td><strong>${escapeHtml(v.name)}</strong></td>
            <td>${Number(v.speed || 0)} km/h</td>
            <td>${escapeHtml(routeName(v.routeId))}</td>
            <td><span class="badge">${v.moving ? "Moving" : "Idle"}</span></td>
            <td class="actions">
              <button data-edit="${v.id}">Edit</button>
              <button data-del="${v.id}" class="warn">Delete</button>
            </td>
          </tr>
        `,
          )
          .join("");

        updateKpis();
      }

      async function load() {
        [vehicles, routes] = await Promise.all([
          api("vehicles"),
          api("routes"),
        ]);
        byId("new-route").innerHTML = routeOptions();
        byId("bulk-route").innerHTML = routeOptions();
        renderRows();
      }

      async function mutateSelectedVehicles(mutator, okMsg) {
        if (!selected.size) return toast("Select vehicles first");
        const selectedVehicles = vehicles.filter((v) => selected.has(v.id));
        await Promise.all(
          selectedVehicles.map((v) => api("vehicles", "PUT", mutator(v))),
        );
        toast(okMsg);
        await load();
      }

      byId("rows").addEventListener("change", (e) => {
        const id = Number(e.target.dataset.id);
        if (!id) return;
        if (e.target.checked) selected.add(id);
        else selected.delete(id);
        updateKpis();
      });

      byId("check-all").addEventListener("change", (e) => {
        const boxes = byId("rows").querySelectorAll(
          'input[type="checkbox"][data-id]',
        );
        boxes.forEach((b) => {
          b.checked = e.target.checked;
          const id = Number(b.dataset.id);
          if (e.target.checked) selected.add(id);
          else selected.delete(id);
        });
        updateKpis();
      });

      byId("rows").addEventListener("click", async (e) => {
        const del = e.target.closest("[data-del]");
        if (del) {
          const id = Number(del.dataset.del);
          await api("vehicles", "DELETE", null, `&id=${id}`);
          selected.delete(id);
          hidden.delete(id);
          toast("Vehicle deleted");
          await load();
          return;
        }

        const edit = e.target.closest("[data-edit]");
        if (edit) {
          const id = Number(edit.dataset.edit);
          const vehicle = vehicles.find((v) => v.id === id);
          if (!vehicle) return;
          const name = prompt("Vehicle name", vehicle.name);
          if (!name) return;
          await api("vehicles", "PUT", { ...vehicle, name: name.trim() });
          toast("Vehicle updated");
          await load();
        }
      });

      byId("btn-add").addEventListener("click", async () => {
        const name = byId("new-name").value.trim();
        const lat = Number(byId("new-lat").value);
        const lng = Number(byId("new-lng").value);
        const speed = Number(byId("new-speed").value) || 40;
        if (!name || !Number.isFinite(lat) || !Number.isFinite(lng)) {
          return toast("Enter name, latitude and longitude");
        }
        await api("vehicles", "POST", {
          name,
          lat,
          lng,
          speed,
          routeId: Number(byId("new-route").value) || 0,
          iconType: "fontawesome",
          icon: "fa-bus",
          color: "#e74c3c",
          moving: false,
          bearing: 0,
        });
        byId("new-name").value = "";
        byId("new-lat").value = "";
        byId("new-lng").value = "";
        toast("Vehicle created");
        await load();
      });

      byId("btn-assign-route").addEventListener("click", async () => {
        const routeId = Number(byId("bulk-route").value) || 0;
        await mutateSelectedVehicles(
          (v) => ({ ...v, routeId }),
          "Route assigned to selected vehicles",
        );
      });

      byId("btn-start-selected").addEventListener("click", async () => {
        await mutateSelectedVehicles(
          (v) => ({ ...v, moving: true }),
          "Selected vehicles started",
        );
      });

      byId("btn-stop-selected").addEventListener("click", async () => {
        await mutateSelectedVehicles(
          (v) => ({ ...v, moving: false }),
          "Selected vehicles stopped",
        );
      });

      byId("btn-hide-selected").addEventListener("click", () => {
        if (!selected.size) return toast("Select vehicles first");
        selected.forEach((id) => hidden.add(id));
        renderRows();
      });

      byId("btn-show-all").addEventListener("click", () => {
        hidden.clear();
        renderRows();
      });

      byId("btn-delete-selected").addEventListener("click", async () => {
        if (!selected.size) return toast("Select vehicles first");
        if (!confirm(`Delete ${selected.size} selected vehicles?`)) return;
        await Promise.all(
          [...selected].map((id) =>
            api("vehicles", "DELETE", null, `&id=${id}`),
          ),
        );
        selected.clear();
        toast("Selected vehicles deleted");
        await load();
      });

      byId("search").addEventListener("input", renderRows);
      byId("btn-refresh").addEventListener("click", load);

      load();
    </script>
  </body>
</html>
