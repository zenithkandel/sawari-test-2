<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sawari Admin Workspace (New)</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="new-admin.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <i class="fa-solid fa-map-location-dot"></i>
          <h1>Sawari Map Workspace</h1>
        </div>

        <div class="tools">
          <button class="tool active" id="tool-select" data-mode="select">
            <i class="fa-solid fa-arrow-pointer"></i> Select
          </button>
          <button class="tool" id="tool-add-stop" data-mode="add-stop">
            <i class="fa-solid fa-map-pin"></i> Add Stop
          </button>
          <button class="tool" id="tool-add-obs" data-mode="add-obstruction">
            <i class="fa-solid fa-circle-exclamation"></i> Add Obstruction
          </button>
          <button class="tool" id="btn-refresh">
            <i class="fa-solid fa-rotate"></i> Refresh
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="left-panel">
          <div class="panel-card">
            <h2>Layers</h2>
            <label
              ><input type="checkbox" id="layer-stops" checked /> Stops</label
            >
            <label
              ><input type="checkbox" id="layer-routes" checked /> Routes</label
            >
            <label
              ><input type="checkbox" id="layer-vehicles" checked />
              Vehicles</label
            >
            <label
              ><input type="checkbox" id="layer-obstructions" checked />
              Obstructions</label
            >
          </div>

          <div class="panel-card">
            <h2>Search</h2>
            <input id="search" type="text" placeholder="Search by name" />
            <div id="search-results" class="results"></div>
          </div>
        </aside>

        <section class="map-wrap">
          <div id="map"></div>
          <div id="hint" class="hint">Mode: Select</div>
        </section>

        <aside class="right-panel">
          <div class="panel-card">
            <h2>Inspector</h2>
            <div id="inspector" class="inspector-empty">
              Select an item on map.
            </div>
          </div>

          <div class="panel-card">
            <h2>Status</h2>
            <ul id="status-list" class="status-list"></ul>
          </div>
        </aside>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="new-admin.js"></script>
  </body>
</html>
