<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sawari - Public Transit Navigator</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Full-screen Map -->
    <div id="map"></div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Search Panel -->
    <div id="search-panel">
      <div class="panel-header">
        <h1><i class="fa-solid fa-bus"></i> Sawari</h1>
        <button class="collapse-btn" id="btn-collapse" title="Collapse panel">
          <i class="fa-solid fa-chevron-up"></i>
        </button>
        <a href="admin.html" class="admin-link"
          ><i class="fa-solid fa-gear"></i> Admin</a
        >
      </div>

      <div class="search-body">
        <!-- Start Location -->
        <div class="input-group">
          <span class="input-icon start"
            ><i class="fa-solid fa-circle-dot"></i
          ></span>
          <input
            type="text"
            id="input-start"
            placeholder="Starting location"
            autocomplete="off"
          />
          <button class="pick-btn" id="btn-pick-start" title="Pick on map">
            <i class="fa-solid fa-location-crosshairs"></i>
          </button>
          <div class="suggestions-dropdown hidden" id="suggestions-start"></div>
        </div>

        <!-- End Location -->
        <div class="input-group">
          <span class="input-icon end"
            ><i class="fa-solid fa-flag-checkered"></i
          ></span>
          <input
            type="text"
            id="input-end"
            placeholder="Destination"
            autocomplete="off"
          />
          <button class="pick-btn" id="btn-pick-end" title="Pick on map">
            <i class="fa-solid fa-location-crosshairs"></i>
          </button>
          <div class="suggestions-dropdown hidden" id="suggestions-end"></div>
        </div>

        <!-- Actions -->
        <div class="search-actions">
          <button class="btn" id="btn-swap" title="Swap start and end">
            <i class="fa-solid fa-arrows-rotate"></i>
          </button>
          <button class="btn btn-primary" id="btn-navigate">
            <i class="fa-solid fa-route"></i> Navigate
          </button>
          <button class="btn" id="btn-clear" title="Clear">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <p id="search-status" class="status-msg">
          Pick your start and destination on the map.
        </p>
      </div>

      <!-- Journey Results (shown after navigation) -->
      <div id="journey-results" class="hidden"></div>
    </div>

    <!-- Live Panel (GPS + Buses) -->
    <div id="live-panel">
      <button class="btn btn-sm" id="btn-gps">
        <i class="fa-solid fa-location-arrow"></i> GPS
      </button>
      <span class="gps-info" id="gps-status">GPS off</span>
      <button
        class="btn btn-sm"
        id="btn-center-gps"
        title="Center on my location"
      >
        <i class="fa-solid fa-crosshairs"></i>
      </button>
      <button
        class="btn btn-sm btn-success hidden"
        id="btn-use-gps-start"
        title="Use GPS as start location"
      >
        <i class="fa-solid fa-circle-dot"></i> Use as Start
      </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="routing.js"></script>
    <script src="app.js"></script>
  </body>
</html>
