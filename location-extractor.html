<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Route Extractor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --border: #2a2a32;
    --accent: #f0e040;
    --accent2: #40e0c8;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --from-color: #f0e040;
    --to-color: #40e0c8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(240,224,64,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 90%, rgba(64,224,200,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 660px;
  }

  .header {
    margin-bottom: 40px;
  }

  .tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(240,224,64,0.3);
    padding: 4px 10px;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 5vw, 42px);
    line-height: 1.05;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
  }

  .input-area {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    margin-bottom: 16px;
    position: relative;
    transition: border-color 0.2s;
  }

  .input-area:focus-within {
    border-color: rgba(240,224,64,0.4);
  }

  .input-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: block;
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    resize: none;
    min-height: 90px;
  }

  textarea::placeholder {
    color: var(--muted);
    font-style: italic;
  }

  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .example-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .example-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .extract-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    color: #0d0d0f;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .extract-btn:hover {
    background: #fff;
    transform: translateY(-1px);
  }

  .extract-btn:active {
    transform: translateY(0);
  }

  .extract-btn.loading {
    pointer-events: none;
    opacity: 0.7;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .result-grid.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
  }

  .result-card.from::before { background: var(--from-color); }
  .result-card.to::before { background: var(--to-color); }

  .result-card-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .result-card.from .result-card-label { color: var(--from-color); }
  .result-card.to .result-card-label { color: var(--to-color); }

  .result-value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--text);
    word-break: break-word;
    min-height: 28px;
  }

  .result-card-icon {
    position: absolute;
    top: 16px; right: 16px;
    font-size: 20px;
    opacity: 0.15;
  }

  .code-output {
    margin-top: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 20px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s 0.1s, transform 0.3s 0.1s;
  }

  .code-output.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .code-output-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  pre {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    line-height: 1.8;
    color: var(--text);
    overflow-x: auto;
  }

  .var-name { color: #c792ea; }
  .var-eq { color: var(--muted); }
  .str-val-from { color: var(--from-color); }
  .str-val-to { color: var(--to-color); }

  .error-msg {
    margin-top: 12px;
    background: rgba(255, 80, 80, 0.08);
    border: 1px solid rgba(255, 80, 80, 0.25);
    padding: 14px 18px;
    font-size: 12px;
    color: #ff8080;
    display: none;
  }

  .error-msg.visible { display: block; }

  .dot-loader {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    vertical-align: middle;
  }

  .dot-loader span {
    width: 5px; height: 5px;
    background: #0d0d0f;
    border-radius: 50%;
    animation: blink 0.9s infinite;
  }

  .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
  .dot-loader span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="tag">// Route Parser</div>
    <h1>Extract <span>Locations</span><br>From Natural Text</h1>
    <p class="subtitle">Type any natural language direction phrase.<br>The AI will isolate your starting point and destination.</p>
  </div>

  <div class="input-area">
    <label class="input-label">Your Prompt</label>
    <textarea id="prompt" placeholder="e.g. take me from bagbazar to basundhara..."></textarea>
  </div>

  <div class="examples">
    <button class="example-btn" onclick="fillExample(this)">i want to go from bagbazar to basundhara</button>
    <button class="example-btn" onclick="fillExample(this)">take me to putalisadak from chakrapath</button>
    <button class="example-btn" onclick="fillExample(this)">directions from thamel to patan durbar square</button>
    <button class="example-btn" onclick="fillExample(this)">how do i reach new baneshwor from koteshwor</button>
  </div>

  <button class="extract-btn" id="extractBtn" onclick="extract()">
    <span id="btnText">Extract Locations</span>
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-grid" id="resultGrid">
    <div class="result-card from">
      <div class="result-card-icon">◉</div>
      <div class="result-card-label">Starting Point</div>
      <div class="result-value" id="fromVal">—</div>
    </div>
    <div class="result-card to">
      <div class="result-card-icon">◎</div>
      <div class="result-card-label">Destination</div>
      <div class="result-value" id="toVal">—</div>
    </div>
  </div>

  <div class="code-output" id="codeOutput">
    <div class="code-output-label">// Variables</div>
    <pre id="codeBlock"></pre>
  </div>
</div>

<script>
  // ─────────────────────────────────────────
  //  🔑 PASTE YOUR GROQ API KEY HERE
  //  Get one free at: https://console.groq.com
  // ─────────────────────────────────────────
  const GROQ_API_KEY = 'YOUR_GROQ_API_KEY_HERE';
  // ─────────────────────────────────────────

  function fillExample(btn) {
    document.getElementById('prompt').value = btn.textContent.trim();
    document.getElementById('prompt').focus();
  }

  async function extract() {
    const prompt = document.getElementById('prompt').value.trim();
    const btn = document.getElementById('extractBtn');
    const btnText = document.getElementById('btnText');
    const errorMsg = document.getElementById('errorMsg');
    const resultGrid = document.getElementById('resultGrid');
    const codeOutput = document.getElementById('codeOutput');

    if (!prompt) {
      showError('Please enter a direction prompt first.');
      return;
    }

    if (!GROQ_API_KEY || GROQ_API_KEY === 'YOUR_GROQ_API_KEY_HERE') {
      showError('Please set your GROQ_API_KEY in the script at the top of the file.');
      return;
    }

    // Loading state
    btn.classList.add('loading');
    btnText.innerHTML = `Extracting <span class="dot-loader"><span></span><span></span><span></span></span>`;
    errorMsg.classList.remove('visible');
    resultGrid.classList.remove('visible');
    codeOutput.classList.remove('visible');

    try {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${GROQ_API_KEY}`
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          max_tokens: 200,
          temperature: 0,
          messages: [
            {
              role: 'system',
              content: `You are a location extractor. Given a natural language direction prompt, extract the starting point and destination.
Return ONLY a raw JSON object with no markdown, no backticks, no explanation. Format:
{"from": "starting location name", "to": "destination location name"}
If you cannot identify both locations, return: {"error": "reason"}`
            },
            { role: 'user', content: prompt }
          ]
        })
      });

      const data = await response.json();

      if (data.error) throw new Error(data.error.message || 'Groq API error.');

      const text = data.choices?.[0]?.message?.content || '';

      let parsed;
      try {
        parsed = JSON.parse(text.trim());
      } catch {
        throw new Error('Could not parse AI response.');
      }

      if (parsed.error) {
        throw new Error(parsed.error);
      }

      if (!parsed.from || !parsed.to) {
        throw new Error('Could not identify both a starting point and destination.');
      }

      // Expose as window variables
      window.startingPoint = parsed.from;
      window.destination = parsed.to;

      // Update UI
      document.getElementById('fromVal').textContent = parsed.from;
      document.getElementById('toVal').textContent = parsed.to;

      document.getElementById('codeBlock').innerHTML =
        `<span class="var-name">startingPoint</span> <span class="var-eq">=</span> <span class="str-val-from">"${escapeHtml(parsed.from)}"</span>\n` +
        `<span class="var-name">destination</span>    <span class="var-eq">=</span> <span class="str-val-to">"${escapeHtml(parsed.to)}"</span>`;

      resultGrid.classList.add('visible');
      codeOutput.classList.add('visible');

    } catch (err) {
      showError(err.message || 'Something went wrong. Please try again.');
    } finally {
      btn.classList.remove('loading');
      btnText.textContent = 'Extract Locations';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠ ' + msg;
    el.classList.add('visible');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Allow Enter key (Ctrl+Enter) to submit
  document.getElementById('prompt').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) extract();
  });
</script>
</body>
</html>
